spring.application.name=kathmandu-aqi

# Server
server.port=8080

# H2 Database (temporary, will switch to Oracle later)
spring.datasource.url=jdbc:h2:mem:aqidb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# OpenAQ API
openaq.api.key=1d8b65a033603bcae16756717be97487ae84f65e17d3280f6cbca299aa4ec93b
openaq.api.base-url=https://api.openaq.org/v3
openaq.kathmandu.coordinates=27.7172,85.3240
openaq.kathmandu.radius=25000

# CORS
cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500